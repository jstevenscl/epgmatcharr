name: Dev — Build on Dev Push

# ─────────────────────────────────────────────────────────────────────────────
# RELEASE PIPELINE OVERVIEW
# ─────────────────────────────────────────────────────────────────────────────
# dev.yml     → push to `dev`       → :dev + :v{version}.{date}.{time}  ← HERE
# main.yml    → push to `main`      → :latest tag
# release.yml → git tag v*.*.*      → :{version} tag
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/epgmatcharr
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dev:
    name: Build Dev Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version and timestamp
        id: meta
        run: |
          VERSION=$(jq -r .version frontend/package.json)
          TIMESTAMP=$(date -u "+%Y%m%d.%H%M")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "dev_tag=v${VERSION}.${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.dev_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Dev image pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.meta.outputs.dev_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.IMAGE_NAME }}:dev" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.dev_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
