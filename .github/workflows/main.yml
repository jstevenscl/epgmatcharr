name: Main — Build on Main Push

# ─────────────────────────────────────────────────────────────────────────────
# RELEASE PIPELINE OVERVIEW
# ─────────────────────────────────────────────────────────────────────────────
# main.yml    → push to `main`      → :latest tag     (what users pull)  ← HERE
# release.yml → git tag v*.*.*      → :{version} tag  (pinned installs)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/epgmatcharr
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-latest:
    name: Build Latest Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Latest image pushed" >> $GITHUB_STEP_SUMMARY
          echo "SHA: ${{ steps.sha.outputs.short }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags: \`:latest\` and \`:latest-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
